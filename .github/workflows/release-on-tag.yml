name: Release on Tag

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build zip
        run: npm run zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/vk-vws-plugin-beta-tester.zip
          generate_release_notes: true
